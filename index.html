<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Style Stars — Premium Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #05050f);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(118, 75, 162, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .glass-premium {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .glass-premium:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #FF6B6B, #5E72E4);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .rank-badge {
            background: linear-gradient(135deg, rgba(94, 114, 228, 0.3), rgba(118, 75, 162, 0.3));
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .profile-section {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .avatar-card, .gift-card {
            flex: 1;
            min-width: 300px;
            padding: 40px 30px;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 25px;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #5E72E4, #764BA2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            cursor: pointer;
            transition: all 0.4s;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            object-fit: cover;
        }

        .avatar-image:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.6);
        }

        .user-name {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .user-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 12px 20px;
            border-radius: 60px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        .gift-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: white;
        }

        .pinned-gift {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border-radius: 32px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.4s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .pinned-gift:hover {
            background: rgba(255,255,255,0.12);
            transform: translateX(8px);
        }

        .gift-icon {
            font-size: 56px;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .gift-name {
            font-size: 20px;
            font-weight: 600;
            color: white;
        }

        .gift-price {
            color: #FFD700;
            font-size: 16px;
            font-weight: 600;
            margin-top: 6px;
        }

        .gift-empty {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 32px;
        }

        .gift-empty:hover {
            border-color: #FFD700;
            color: #FFD700;
        }

        .rating-section {
            padding: 30px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .rating-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: white;
        }

        .rating-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rating-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 28px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .rating-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(8px);
        }

        .rating-place {
            width: 48px;
            font-size: 28px;
            font-weight: 700;
        }

        .rating-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #5E72E4, #764BA2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            object-fit: cover;
        }

        .rating-name {
            flex: 1;
            font-weight: 600;
            color: white;
        }

        .rating-stars {
            color: #FFD700;
            font-weight: 700;
            font-size: 18px;
        }

        .btn {
            background: linear-gradient(135deg, #5E72E4, #764BA2);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 16px;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 450px;
            width: 90%;
            padding: 30px;
            border-radius: 48px;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .avatars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .avatar-option {
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .avatar-option:hover {
            transform: scale(1.1
